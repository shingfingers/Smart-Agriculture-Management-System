# 端口号
server:
  port: 8080

# 日志格式
logging:
  pattern:
    console: '%d{HH:mm:ss.SSS} %clr(%-5level) ---  [%-15thread] %cyan(%-50logger{50}):%msg%n'

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  application:
    name: farm_main # 模块名
  # 数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql:///baizhanfarm?serverTimezone=UTC
    username: root
    password: 123456
  cache:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms

# 配置Mybatis-plus
mybatis-plus:
  global-config:
    db-config:
      # 主键生成策略为自增
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true # 开启列名自动驼峰命名映射规则
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启sql日志

# JWT配置
jwt:
  # JWT密钥
  secret: myVeryLongSecretKeyForJWTTokenGenerationThatMustBeLongEnoughForSecurity123456789
  # JWT过期时间（秒）7天 = 7 * 24 * 60 * 60 = 604800
  expiration: 604800


